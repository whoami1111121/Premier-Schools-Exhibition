<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premier Schools Exhibition</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- nav section -->
    <header class="header">
      <div class="container">
        <a href="/" class="header_logo">
          <img
            src="images/mainlogo.svg"
            alt="Premier Schools Exhibition Logo"
          />
        </a>

        <div class="header_btn_sec">
          <button class="btn">
            <div class="header_btn">
              <div class="header_btn_bg"></div>
              <div class="header_btn_content">
                <div class="header_btn_content_img">
                  <img src="icons/arrow_white.svg" alt="" />
                </div>
                <div class="header_btn_content_text">Register Now</div>
              </div>
            </div>
          </button>
          <button class="btn header_btn_scroll">
            Register Now
            <img src="icons/arrow.svg" alt="" style="rotate: 45deg" />
          </button>
        </div>
      </div>
    </header>
    <div class="navbar_gap"></div>

    <!-- hero secton -->
    <div class="hero">
      <div class="container">
        <div class="hero_sec">
          <div class="hero_content">
            <div class="hero_content_text">
              <h2>Discover Gurugram’s</h2>
              <h1>Top 30+ Schools</h1>
              <h3>All In One Place</h3>
            </div>
            <div class="hide_mobile hero_content_box">
              <div>
                <h1>Apparel House,</h1>
                <p>Sec 44, Gurugram</p>
              </div>
              <span></span>
              <div>
                <h1>2-3 August 2025</h1>
                <p>Sat-Sun | 10AM - 6PM</p>
              </div>
            </div>
          </div>
          <div class="hero_img">
            <img src="images/heroImg.png" alt="" />
          </div>
          <div class="hero_form">
            <div class="hero_form_sec">
              <h1>Enquire Now</h1>
              <div class="hero_form_sec_form">
                <input type="text" placeholder="Parent’s Name" />
                <input type="text" placeholder="Phone number" />
                <textarea
                  name=""
                  id=""
                  placeholder="Which grade are you looking for?"
                ></textarea>
              </div>
              <div>
                <button class="btn">
                  <div class="hero_form_btn">
                    <div class="hero_form_btn_bg"></div>
                    <div class="hero_form_btn_content">
                      <div class="hero_form_btn_content_img">
                        <img src="icons/arrow.svg" alt="" />
                      </div>
                      <div class="hero_form_btn_content_text">Submit</div>
                    </div>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="display: block; height: 3000px; background-color: pink"></div>
    <h1>Premier Schools Exhibition</h1>

    <script src="js/main.js"></script>
  </body>
</html>
